<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn Delaney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-intro" id="pageIntro">
        <div class="page-intro__line"><span class="page-intro__word" id="introWord1">Finn</span></div>
        <div class="page-intro__line"><span class="page-intro__word page-intro__word--second" id="introWord2">Delaney</span></div>
    </div>
    <section class="home-hero">
        <hgroup>
            <h1 class="home-hero__title">
                <span class="segment segment--first">Finn Delaney</span>
                <span class="segment segment--second">died as he lived:</span>
                <span class="segment segment--third">taking photos</span>
            </h1>
        </hgroup>
        <div class="home-hero__accent-image">
            <img src="hero.jpg" alt="" width="1002" height="1250" loading="eager" fetchpriority="high">
        </div>
        <nav class="home-nav">
            <p class="home-nav__meta-title">Work</p>
            <ul role="list" class="home-nav__list">
                <li class="home-nav__list-item">
                    <a href="/portfolio.html" class="home-nav__link">
                        <span class="home-nav__link-title">Portfolio</span>
                        <span inert class="home-nav__link-description">— Selected photos and series</span>
                    </a>
                </li>
                <li class="home-nav__list-item">
                    <a href="/archive" class="home-nav__link">
                        <span class="home-nav__link-title">Archive</span>
                        <span inert class="home-nav__link-description">— The full body of work</span>
                    </a>
                </li>
            </ul>

            <p class="home-nav__meta-title">Info</p>
            <ul role="list" class="home-nav__list">
                <li class="home-nav__list-item">
                    <a href="/about" class="home-nav__link">
                        <span class="home-nav__link-title">About</span>
                        <span inert class="home-nav__link-description">— The man behind the lens</span>
                    </a>
                </li>
                <li class="home-nav__list-item">
                    <a href="/contact" class="home-nav__link">
                        <span class="home-nav__link-title">Contact</span>
                        <span inert class="home-nav__link-description">— Get in touch</span>
                    </a>
                </li>
            </ul>
        </nav>
    </section>
    <footer class="site-footer">
        <p>The personal site and portfolio of photographer Finn Delaney.</p>
    </footer>
    <script>
    (function () {
        var intro = document.getElementById('pageIntro');
        if (!intro) return;
        var words = intro.querySelectorAll('.page-intro__word');

        // Stagger words in
        setTimeout(function () { words[0].classList.add('is-visible'); }, 80);
        setTimeout(function () { words[1].classList.add('is-visible'); }, 200);

        // Lift curtain after words have settled
        setTimeout(function () {
            intro.classList.add('is-leaving');
            setTimeout(function () { intro.parentNode && intro.parentNode.removeChild(intro); }, 1150);
        }, 1600);
    }());
    </script>
    <script>
    (function () {
        // On mobile the segment--first ("FINN DELANEY") is rotated 90deg.
        // getBoundingClientRect() returns the visual bounding box including
        // that transform, so .bottom gives the true bottom of the "Y" glyph.
        // We add a margin-block-start to segment--third so its bottom matches.
        function alignThird() {
            if (window.innerWidth >= 600) return;
            var first = document.querySelector('.segment--first');
            var third = document.querySelector('.segment--third');
            if (!first || !third) return;

            third.style.marginBlockStart = '';

            var firstBottom = first.getBoundingClientRect().bottom;
            var thirdBottom = third.getBoundingClientRect().bottom;
            // Only push down — never pull up (negative diff means font wasn't
            // measured yet or layout is still settling; pulling up causes overlap).
            var diff = Math.max(0, firstBottom - thirdBottom);

            if (diff > 0.5) {
                third.style.marginBlockStart = diff + 'px';
            }
        }

        function alignThirdAfterLayout() {
            // Two rAF passes let the browser apply the custom font to layout
            // before we measure, avoiding a stale fallback-font measurement.
            requestAnimationFrame(function () {
                requestAnimationFrame(alignThird);
            });
        }

        document.fonts.ready.then(function () {
            alignThirdAfterLayout();
            window.addEventListener('resize', function () {
                var third = document.querySelector('.segment--third');
                if (third) third.style.marginBlockStart = '';
                alignThirdAfterLayout();
            });
        });
    }());
    </script>
</body>
</html>
