<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Finn Delaney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-page">
    <a href="/" class="portfolio-back">← Finn Delaney</a>

    <nav class="portfolio-minimap" aria-label="Portfolio navigation">
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__tracker" id="minimapTracker"></div>
    </nav>

    <div class="portfolio-scroll" id="portfolioScroll">
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Series I">
            </figure>
            <p class="portfolio-frame__title">Series I</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Series II">
            </figure>
            <p class="portfolio-frame__title">Series II</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Portraits">
            </figure>
            <p class="portfolio-frame__title">Portraits</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Still Life">
            </figure>
            <p class="portfolio-frame__title">Still Life</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Documentary">
            </figure>
            <p class="portfolio-frame__title">Documentary</p>
        </article>
    </div>

    <script>
        const scroll = document.getElementById('portfolioScroll');
        const tracker = document.getElementById('minimapTracker');
        const frames = document.querySelectorAll('.portfolio-frame');

        let currentIndex = 0;
        let isAnimating = false;

        function goTo(index) {
            index = Math.max(0, Math.min(frames.length - 1, index));
            if (index === currentIndex && isAnimating) return;
            currentIndex = index;
            isAnimating = true;
            frames[currentIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            setTimeout(() => isAnimating = false, 700);
            updateMinimap();
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
            if (delta > 0) goTo(currentIndex + 1);
            else if (delta < 0) goTo(currentIndex - 1);
        }, { passive: false });

        // Keyboard arrow support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentIndex + 1);
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(currentIndex - 1);
        });

        // Minimap tracker
        const lineCount = 20;
        const trackerWidth = 30;
        const maxTravel = lineCount * 1 + (lineCount - 1) * 9 - trackerWidth; // 161px

        function updateMinimap() {
            const progress = currentIndex / (frames.length - 1);
            tracker.style.transform = `translateX(${progress * maxTravel}px)`;
            tracker.dataset.active = currentIndex > 0 ? 'true' : 'false';
        }
    </script>
</body>
</html>
