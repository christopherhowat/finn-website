<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Finn Delaney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-page">
    <a href="/" class="portfolio-back">← Finn Delaney</a>

    <nav class="portfolio-minimap" aria-label="Portfolio navigation">
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__tracker" id="minimapTracker"></div>
    </nav>

    <div class="portfolio-scroll" id="portfolioScroll">
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Series I">
            </figure>
            <p class="portfolio-frame__title">Series I</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Series II">
            </figure>
            <p class="portfolio-frame__title">Series II</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Portraits">
            </figure>
            <p class="portfolio-frame__title">Portraits</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Still Life">
            </figure>
            <p class="portfolio-frame__title">Still Life</p>
        </article>
        <article class="portfolio-frame">
            <figure class="portfolio-frame__figure">
                <img src="hero.jpg" alt="Documentary">
            </figure>
            <p class="portfolio-frame__title">Documentary</p>
        </article>
    </div>

    <script>
        const scroll = document.getElementById('portfolioScroll');
        const tracker = document.getElementById('minimapTracker');

        const lineCount = 20;
        const lineWidth = 1;
        const lineGap = 9;
        const trackerWidth = 30;
        const totalWidth = lineCount * lineWidth + (lineCount - 1) * lineGap;
        const maxTravel = totalWidth - trackerWidth;

        scroll.addEventListener('scroll', () => {
            const progress = scroll.scrollLeft / (scroll.scrollWidth - scroll.offsetWidth);
            tracker.style.transform = `translateX(${progress * maxTravel}px)`;
            tracker.dataset.active = progress > 0 ? 'true' : 'false';
        }, { passive: true });
    </script>
</body>
</html>
