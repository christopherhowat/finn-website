<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Finn Delaney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-page">
    <a href="/" class="portfolio-back">← Finn Delaney</a>

    <nav class="portfolio-minimap" aria-label="Portfolio navigation">
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__line"></div>
        <div class="portfolio-minimap__tracker" id="minimapTracker"></div>
    </nav>

    <div class="portfolio-stage" id="portfolioStage">
        <div class="portfolio-track" id="portfolioTrack">
            <article class="portfolio-frame">
                <figure class="portfolio-frame__figure">
                    <img src="hero.jpg" alt="Series I">
                </figure>
                <p class="portfolio-frame__title">Series I</p>
            </article>
            <article class="portfolio-frame">
                <figure class="portfolio-frame__figure">
                    <img src="hero.jpg" alt="Series II">
                </figure>
                <p class="portfolio-frame__title">Series II</p>
            </article>
            <article class="portfolio-frame">
                <figure class="portfolio-frame__figure">
                    <img src="hero.jpg" alt="Portraits">
                </figure>
                <p class="portfolio-frame__title">Portraits</p>
            </article>
            <article class="portfolio-frame">
                <figure class="portfolio-frame__figure">
                    <img src="hero.jpg" alt="Still Life">
                </figure>
                <p class="portfolio-frame__title">Still Life</p>
            </article>
            <article class="portfolio-frame">
                <figure class="portfolio-frame__figure">
                    <img src="hero.jpg" alt="Documentary">
                </figure>
                <p class="portfolio-frame__title">Documentary</p>
            </article>
        </div>
    </div>

    <script>
        const stage   = document.getElementById('portfolioStage');
        const tracker = document.getElementById('minimapTracker');
        const frames  = Array.from(document.querySelectorAll('.portfolio-frame'));
        const N       = frames.length;

        // Minimap: 20 lines × 1px wide, 9px gap, 30px tracker → max travel = 161px
        const MINIMAP_TRAVEL = 20 * 1 + 19 * 9 - 30;

        function updateMinimap() {
            const max  = stage.scrollWidth - stage.clientWidth;
            const prog = max > 0 ? stage.scrollLeft / max : 0;
            tracker.style.transform = `translateX(${prog * MINIMAP_TRAVEL}px)`;
            tracker.dataset.active  = stage.scrollLeft > 2 ? 'true' : 'false';
        }

        stage.addEventListener('scroll', updateMinimap, { passive: true });
        updateMinimap();
    </script>
</body>
</html>
